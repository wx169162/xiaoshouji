<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>消息 - AI聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .app {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #fff;
        }

        /* ========= 主内容区 ========= */
        .main {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #fff;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .app.drawer-open .main {
            transform: translateX(280px);
        }

        /* ========= 顶部栏 ========= */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background-color: #ffffff;
            border-bottom: 0.5px solid #e9e9ef;
            height: 56px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            min-width: 44px;
        }

        .back-to-desktop {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #007aff;
            cursor: pointer;
            border-radius: 8px;
            background: #f2f2f6;
            transition: all 0.2s;
        }

        .back-to-desktop:active {
            background: #e5e5ea;
            transform: scale(0.95);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: #1c1c1e;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 80px;
            justify-content: flex-end;
        }

        .avatar-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 18px;
            color: white;
            font-weight: 500;
        }

        .avatar-btn:active {
            opacity: 0.7;
            transform: scale(0.95);
        }

        .plus-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #007aff;
            cursor: pointer;
            border-radius: 8px;
        }

        .plus-btn:active {
            background: #f2f2f6;
            transform: scale(0.95);
        }

        /* ========= 页面容器 ========= */
        .pages-container {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .page {
            display: none;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: #f8f8fa;
            overflow-y: auto;
        }

        .page.active {
            display: flex;
        }

        /* 消息列表样式 */
        .message-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            cursor: pointer;
            transition: transform .2s ease, background .2s;
            position: relative;
            z-index: 1;
            border-bottom: 0.5px solid #f0f0f0;
            touch-action: pan-y;
        }
        .chat-item:active {
            background: #f8f8fa;
        }
        .chat-swipe-wrap {
            position: relative;
            overflow: hidden;
        }
        .chat-actions {
            position: absolute;
            right: 0; top: 0; bottom: 0;
            display: flex;
            z-index: 0;
        }
        .chat-action-btn {
            width: 72px;
            border: none;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
        }
        .chat-action-btn.pin { background: #5856d6; }
        .chat-action-btn.del { background: #ff3b30; }
        .chat-item.pinned::before {
            content: '📌';
            position: absolute;
            top: 4px;
            right: 8px;
            font-size: 10px;
            opacity: .6;
            z-index: 2;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            font-weight: 500;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 500;
            color: #1c1c1e;
        }

        .chat-time {
            font-size: 11px;
            color: #8e8e93;
        }

        .chat-preview {
            font-size: 13px;
            color: #8e8e93;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 65vw;
        }

        /* 联系人列表样式 */
        .contacts-list {
            padding: 8px 0;
        }

        .contact-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: white;
            border-bottom: 0.5px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .contact-item:active {
            background: #f8f8fa;
        }

        .contact-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }

        .contact-info {
            flex: 1;
        }

        .contact-name {
            font-size: 17px;
            font-weight: 500;
            color: #1c1c1e;
            margin-bottom: 4px;
        }

        .contact-desc {
            font-size: 13px;
            color: #8e8e93;
        }

        /* 底部导航 */
        .bottom-nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-top: 0.5px solid #e9e9ef;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 8px 16px 10px;
            height: 68px;
            flex-shrink: 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: color 0.2s;
            color: #8e8e93;
            font-size: 10px;
        }

        .nav-item.active {
            color: #007aff;
        }

        .nav-icon {
            font-size: 24px;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 500;
        }

        /* 侧拉栏样式 */
        .drawer {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background-color: #ffffff;
            z-index: 20;
            transform: translateX(-100%);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .app.drawer-open .drawer {
            transform: translateX(0);
        }

        .drawer-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            z-index: 15;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }

        .app.drawer-open .drawer-overlay {
            opacity: 1;
            visibility: visible;
        }

        .drawer-header {
            padding: 40px 20px 24px;
            text-align: center;
        }

        .drawer-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
        }

        .drawer-name {
            font-size: 20px;
            font-weight: 600;
        }

        .online-status {
            font-size: 13px;
            color: #34c759;
            background: #e8f5ea;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
        }

        .drawer-menu {
            padding: 12px 0;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            gap: 16px;
            cursor: pointer;
        }

        .menu-item:active {
            background: #f8f8fa;
        }

        /* 美化确认弹窗 */
        .del-modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);justify-content:center;align-items:center;padding:20px}
        .del-modal-overlay.open{display:flex}
        .del-modal{background:#fff;border-radius:24px;width:100%;max-width:320px;padding:28px 24px 20px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
        .del-modal .icon{font-size:40px;margin-bottom:12px}
        .del-modal h4{font-size:17px;color:#1e293b;margin-bottom:8px}
        .del-modal .desc{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:20px}
        .del-modal .btns{display:flex;gap:10px}
        .del-modal .btns button{flex:1;padding:12px;border:none;border-radius:20px;font-size:15px;cursor:pointer;font-weight:500}
        .del-modal .btns .cancel{background:#f1f5f9;color:#64748b}
        .del-modal .btns .confirm-danger{background:#dc2626;color:#fff}

        .drawer-close {
            position: absolute;
            top: 12px;
            right: 16px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #f2f2f6;
            border-radius: 50%;
            cursor: pointer;
        }

        .page-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8e8e93;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- 侧拉栏 -->
    <div class="drawer" id="drawer">
        <div class="drawer-close" id="drawerClose">✕</div>
        <div class="drawer-header">
            <div class="drawer-avatar">😊</div>
            <div class="drawer-name">我的账号</div>
            <div class="online-status">● 在线</div>
        </div>
        <div class="drawer-menu">
            <div class="menu-item" data-action="profile">📋 我的资料</div>
            <div class="menu-item" data-action="favorites">⭐ 收藏</div>
            <div class="menu-item" data-action="settings">⚙️ 设置</div>
            <div class="menu-item" data-action="logout">🚪 退出登录</div>
        </div>
    </div>
    <div class="drawer-overlay" id="drawerOverlay"></div>

    <!-- 主内容区 -->
    <div class="main" id="main">
        <div class="header" id="mainHeader">
            <div class="header-left">
                <div class="back-to-desktop" id="backToDesktopBtn">←</div>
            </div>
            <div class="header-title" id="headerTitle">消息</div>
            <div class="header-right">
                <div class="avatar-btn" id="avatarBtn">😀</div>
                <div class="plus-btn" id="plusBtn">+</div>
            </div>
        </div>

        <div class="pages-container">
            <!-- 消息页 -->
            <div class="page active" id="pageMessages" data-page="messages">
                <div id="messageListContainer" class="message-list"></div>
            </div>

            <!-- 联系人页 -->
            <div class="page" id="pageContacts" data-page="contacts">
                <div class="contacts-list" id="contactsListContainer"></div>
            </div>

            <!-- 动态页 -->
            <div class="page" id="pageMoments" data-page="moments">
                <div style="padding: 40px 20px; text-align: center;">
                    <div style="font-size: 48px; margin-bottom: 16px;">📱</div>
                    <div style="font-size: 18px; font-weight: 500;">动态页开发中</div>
                    <div style="font-size: 14px; color: #8e8e93; margin-top: 8px;">朋友圈功能敬请期待</div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" data-nav="messages"><div class="nav-icon">💬</div><div class="nav-label">消息</div></div>
            <div class="nav-item" data-nav="contacts"><div class="nav-icon">👤</div><div class="nav-label">联系人</div></div>
            <div class="nav-item" data-nav="moments"><div class="nav-icon">🌟</div><div class="nav-label">动态</div></div>
        </div>
    </div>
</div>

<script>
    // ======================== AI 角色数据（localStorage 统一管理） ========================
    const DEFAULT_CONTACTS = [];

    function loadContacts() {
        const saved = localStorage.getItem('contacts');
        if (saved) {
            try { return JSON.parse(saved); } catch(e) {}
        }
        const defaults = JSON.parse(JSON.stringify(DEFAULT_CONTACTS));
        localStorage.setItem('contacts', JSON.stringify(defaults));
        return defaults;
    }

    function saveContacts(contacts) {
        localStorage.setItem('contacts', JSON.stringify(contacts));
    }

    let AI_CONTACTS = loadContacts();

    // 聊天记录存储
    let chatHistory = {};

    // 初始化聊天记录
    AI_CONTACTS.forEach(contact => {
        if (!chatHistory[contact.id]) {
            chatHistory[contact.id] = [];
        }
    });

    // 辅助函数: 获取当前时间字符串
    function getCurrentTimeString() {
        const now = new Date();
        return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    }

    // 添加消息（格式与 room.html 一致）
    function addMessage(contactId, text, sender) {
        const message = {
            id: Date.now() + '_' + Math.random(),
            role: sender === 'user' ? 'user' : 'assistant',
            content: text,
            timestamp: getCurrentTimeString(),
            fullDate: new Date().toISOString(),
            versions: [],
            isRecalled: false,
            recalledContent: null
        };
        if (!chatHistory[contactId]) chatHistory[contactId] = [];
        chatHistory[contactId].push(message);
        saveChatsToLocal(contactId);
        renderMessageList();
        renderContactsList();
        return message;
    }

    // 保存到 localStorage（按联系人分开存，与 room.html 一致）
    function saveChatsToLocal(contactId) {
        try {
            localStorage.setItem(`chat_history_${contactId}`, JSON.stringify(chatHistory[contactId] || []));
        } catch(e) { console.warn(e); }
    }

    function loadChatsFromLocal() {
        AI_CONTACTS.forEach(c => {
            try {
                const saved = localStorage.getItem(`chat_history_${c.id}`);
                if (saved) chatHistory[c.id] = JSON.parse(saved);
                else chatHistory[c.id] = [];
            } catch(e) { chatHistory[c.id] = []; }
        });
    }

    // 获取联系人信息
    function getContactById(id) {
        return AI_CONTACTS.find(c => c.id === id);
    }
    function getContactDisplayName(contact) {
        const settings = JSON.parse(localStorage.getItem('contacts_custom_settings') || '{}');
        const s = settings[contact.id];
        if (s && s.nickname && s.nickname.trim()) return s.nickname.trim();
        if (s && s.realName && s.realName.trim()) return s.realName.trim();
        return contact.name;
    }
    function getContactAvatar(id, fallback) {
        const settings = JSON.parse(localStorage.getItem('contacts_custom_settings') || '{}');
        if (settings[id] && settings[id].roleAvatar) return settings[id].roleAvatar;
        return fallback || '🤖';
    }
    function renderAvatarHtml(contactId, fallbackEmoji) {
        const av = getContactAvatar(contactId, fallbackEmoji);
        if (av.startsWith('data:') || av.startsWith('http')) {
            return `<div class="chat-avatar" style="background-image:url(${av});background-size:cover;background-position:center"></div>`;
        }
        return `<div class="chat-avatar">${av}</div>`;
    }

    // 渲染消息列表
    function renderMessageList() {
        const container = document.getElementById('messageListContainer');
        if (!container) return;
        
        const messageItems = [...AI_CONTACTS]
            .sort((a, b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0))
            .map(contact => {
                const messages = chatHistory[contact.id] || [];
                const lastMsg = messages.length > 0 ? messages[messages.length - 1] : null;
                let preview = lastMsg ? (lastMsg.role === 'user' ? `我: ${lastMsg.content}` : `${getContactDisplayName(contact)}: ${lastMsg.content}`) : '暂无消息，点击开始聊天';
                let timeStr = lastMsg ? lastMsg.timestamp : '';
                return {
                    id: contact.id,
                    name: getContactDisplayName(contact),
                    avatar: contact.avatar,
                    preview: preview,
                    time: timeStr,
                    pinned: contact.pinned
                };
            });

        if (messageItems.length === 0) {
            container.innerHTML = '<div style="padding:40px;text-align:center;color:#8e8e93;">暂无消息记录</div>';
            return;
        }

        container.innerHTML = messageItems.map(item => `
            <div class="chat-swipe-wrap" data-contact-id="${item.id}">
                <div class="chat-actions">
                    <button class="chat-action-btn pin" data-action="pin" data-id="${item.id}">📌<span>置顶</span></button>
                    <button class="chat-action-btn del" data-action="del" data-id="${item.id}">🗑️<span>删除</span></button>
                </div>
                <div class="chat-item${item.pinned ? ' pinned' : ''}" data-contact-id="${item.id}">
                    ${renderAvatarHtml(item.id, item.avatar)}
                    <div class="chat-info">
                        <div class="chat-name-row">
                            <span class="chat-name">${escapeHtml(item.name)}</span>
                            <span class="chat-time">${item.time}</span>
                        </div>
                        <div class="chat-preview">${escapeHtml(item.preview)}</div>
                    </div>
                </div>
            </div>
        `).join('');

        // 绑定事件
        let openSwipeItem = null;
        function closeAllSwipes() {
            document.querySelectorAll('#messageListContainer .chat-item').forEach(el => el.style.transform = 'translateX(0)');
            openSwipeItem = null;
        }
        document.getElementById('messageListContainer').addEventListener('click', (e) => {
            if (!e.target.closest('.chat-swipe-wrap')) closeAllSwipes();
        });

        document.querySelectorAll('#messageListContainer .chat-swipe-wrap').forEach(wrap => {
            const item = wrap.querySelector('.chat-item');
            const contactId = wrap.getAttribute('data-contact-id');
            let startX = 0, startY = 0, moveX = 0, isSwiping = false;

            // 点击进入聊天
            item.addEventListener('click', (e) => {
                if (isSwiping) { e.preventDefault(); e.stopPropagation(); return; }
                if (openSwipeItem && openSwipeItem !== item) { closeAllSwipes(); return; }
                window.location.href = `room.html?id=${contactId}`;
            });

            // 左滑手势
            item.addEventListener('touchstart', (e) => {
                closeAllSwipes();
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                moveX = 0; isSwiping = false;
            }, {passive: true});
            item.addEventListener('touchmove', (e) => {
                moveX = e.touches[0].clientX - startX;
                const moveY = e.touches[0].clientY - startY;
                if (Math.abs(moveX) > Math.abs(moveY) && moveX < -5) {
                    isSwiping = true;
                    item.style.transform = `translateX(${Math.max(moveX, -144)}px)`;
                    e.preventDefault();
                }
            }, {passive: false});
            item.addEventListener('touchend', () => {
                if (isSwiping && moveX < -60) {
                    item.style.transform = 'translateX(-144px)';
                    openSwipeItem = item;
                } else {
                    item.style.transform = 'translateX(0)';
                    openSwipeItem = null;
                }
                setTimeout(() => { isSwiping = false; }, 150);
            });

            // 按钮
            wrap.querySelector('[data-action="pin"]').onclick = (e) => {
                e.stopPropagation();
                togglePin(contactId);
                closeAllSwipes();
            };
            wrap.querySelector('[data-action="del"]').onclick = (e) => {
                e.stopPropagation();
                const name = getContactById(contactId)?.name || contactId;
                showDeleteConfirm(name, () => deleteContact(contactId));
            };
        });
    }

    function togglePin(contactId) {
        const c = AI_CONTACTS.find(c => c.id === contactId);
        if (c) { c.pinned = !c.pinned; saveContacts(AI_CONTACTS); renderMessageList(); }
    }

    function showDeleteConfirm(name, action) {
        const modal = document.getElementById('delModal');
        document.getElementById('delModalTitle').textContent = `删除「${name}」？`;
        document.getElementById('delModalDesc').textContent = `删除后「${name}」将从联系人列表中完全消失，所有聊天记录、记忆和设置都将被清除，无法找回。`;
        document.getElementById('delModalConfirm').onclick = () => { modal.classList.remove('open'); action(); };
        document.getElementById('delModalCancel').onclick = () => modal.classList.remove('open');
        modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('open'); };
        modal.classList.add('open');
    }

    function deleteContact(contactId) {
        AI_CONTACTS = AI_CONTACTS.filter(c => c.id !== contactId);
        saveContacts(AI_CONTACTS);
        delete chatHistory[contactId];
        localStorage.removeItem(`chat_history_${contactId}`);
        localStorage.removeItem(`memory_${contactId}`);
        localStorage.removeItem(`appearance_${contactId}`);
        localStorage.removeItem(`emoji_${contactId}`);
        const css = JSON.parse(localStorage.getItem('contacts_custom_settings') || '{}');
        delete css[contactId];
        localStorage.setItem('contacts_custom_settings', JSON.stringify(css));
        renderMessageList();
        renderContactsList();
    }
    
    // 渲染联系人列表
    function renderContactsList() {
        const container = document.getElementById('contactsListContainer');
        if (!container) return;
        container.innerHTML = AI_CONTACTS.map(contact => `
            <div class="contact-item" data-contact-id="${contact.id}">
                ${renderAvatarHtml(contact.id, contact.avatar)}
                <div class="contact-info">
                    <div class="contact-name">${escapeHtml(getContactDisplayName(contact))}</div>
                    <div class="contact-desc">${escapeHtml(contact.desc)}</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('#contactsListContainer .contact-item').forEach(el => {
            el.addEventListener('click', () => {
                const contactId = el.getAttribute('data-contact-id');
                // 使用相对路径，跳转到同一目录下的 room.html
                window.location.href = `room.html?id=${contactId}`;
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '"') return '&quot;';
            if (m === '\'') return '&#39;';
            return m;
        });
    }
    
    // ======================== 页面导航和侧拉栏逻辑 ========================
    let isDrawerOpen = false;
    const appEl = document.getElementById('app');
    const avatarBtn = document.getElementById('avatarBtn');
    const backToDesktopBtn = document.getElementById('backToDesktopBtn');
    const plusBtn = document.getElementById('plusBtn');
    const drawerClose = document.getElementById('drawerClose');
    const drawerOverlay = document.getElementById('drawerOverlay');
    
    function openDrawer() { if (!isDrawerOpen) { isDrawerOpen = true; appEl.classList.add('drawer-open'); } }
    function closeDrawer() { if (isDrawerOpen) { isDrawerOpen = false; appEl.classList.remove('drawer-open'); } }
    function toggleDrawer() { isDrawerOpen ? closeDrawer() : openDrawer(); }
    
    function switchToPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page${pageId.charAt(0).toUpperCase() + pageId.slice(1)}`).classList.add('active');
        const titles = { messages: '消息', contacts: '联系人', moments: '动态' };
        document.getElementById('headerTitle').innerText = titles[pageId];
        document.querySelectorAll('.nav-item').forEach(item => {
            item.classList.remove('active');
            if (item.getAttribute('data-nav') === pageId) item.classList.add('active');
        });
        if (pageId === 'messages') renderMessageList();
        if (pageId === 'contacts') renderContactsList();
        closeDrawer();
    }
    
    // 底部导航事件
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => {
            const nav = item.getAttribute('data-nav');
            if (nav) switchToPage(nav);
        });
    });
    
    if (avatarBtn) avatarBtn.addEventListener('click', toggleDrawer);
    if (drawerOverlay) drawerOverlay.addEventListener('click', closeDrawer);
    if (drawerClose) drawerClose.addEventListener('click', closeDrawer);
    if (plusBtn) plusBtn.addEventListener('click', showCreateContactModal);

    // ========== 创建角色弹窗 ==========
    let tempNewAvatar = '🤖';
    function showCreateContactModal() {
        tempNewAvatar = '🤖';
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center';
        overlay.innerHTML = `<div style="background:#fff;border-radius:24px;padding:28px 24px;width:90%;max-width:340px;text-align:center">
            <h3 style="margin-bottom:20px;font-size:18px">➕ 加好友</h3>
            <div style="display:flex;justify-content:center;margin-bottom:20px">
                <div id="newAvatarPreview" style="width:80px;height:80px;border-radius:50%;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:36px;cursor:pointer;overflow:hidden;background-size:cover;background-position:center;border:2px solid #e2e8f0">🤖</div>
            </div>
            <input type="file" id="newAvatarFileInput" accept="image/*" style="display:none">
            <div style="font-size:12px;color:#94a3b8;margin-bottom:16px">点击头像上传图片，留空使用emoji</div>
            <input id="newContactName" placeholder="角色名称" style="width:100%;padding:10px;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:10px;font-size:15px;text-align:center">
            <input id="newContactId" placeholder="ID（留空自动生成）" style="width:100%;padding:10px;border-radius:12px;border:1px solid #e2e8f0;margin-bottom:20px;font-size:13px;text-align:center;color:#94a3b8">
            <div style="display:flex;gap:10px"><button id="confirmCreateBtn" style="flex:1;padding:12px;background:#007aff;color:#fff;border:none;border-radius:20px;font-size:15px;cursor:pointer">加好友</button><button id="cancelCreateBtn" style="flex:1;padding:12px;background:#f1f5f9;border:none;border-radius:20px;font-size:15px;cursor:pointer">取消</button></div>
        </div>`;
        document.body.appendChild(overlay);
        const avatarPreview = document.getElementById('newAvatarPreview');
        avatarPreview.onclick = () => document.getElementById('newAvatarFileInput').click();
        document.getElementById('newAvatarFileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const MAX = 200; let w = img.width, h = img.height;
                    if (w > MAX) { h = h * (MAX / w); w = MAX; }
                    if (h > MAX) { w = w * (MAX / h); h = MAX; }
                    const c = document.createElement('canvas'); c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    tempNewAvatar = c.toDataURL('image/jpeg', 0.7);
                    avatarPreview.style.backgroundImage = `url(${tempNewAvatar})`;
                    avatarPreview.textContent = '';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };
        document.getElementById('cancelCreateBtn').onclick = () => overlay.remove();
        document.getElementById('confirmCreateBtn').onclick = () => {
            const name = document.getElementById('newContactName').value.trim();
            if (!name) { alert('请输入角色名称'); return; }
            let newId = document.getElementById('newContactId').value.trim();
            if (!newId) newId = 'custom_' + Date.now();
            if (AI_CONTACTS.some(c => c.id === newId)) { alert('ID已存在，请换一个'); return; }
            const avatar = tempNewAvatar;
            AI_CONTACTS.push({ id: newId, name, avatar, desc: '', role: 'general' });
            saveContacts(AI_CONTACTS);
            chatHistory[newId] = [];
            // 同时初始化 contacts_custom_settings，使头像同步
            const css = JSON.parse(localStorage.getItem('contacts_custom_settings') || '{}');
            css[newId] = { roleAvatar: avatar, myAvatar: '😀', realName: name, nickname: '', callPrefer: '', rolePersona: '', userPersona: '', styleInstruction: '', worldBook: 'default', isBlocked: false };
            localStorage.setItem('contacts_custom_settings', JSON.stringify(css));
            renderMessageList();
            renderContactsList();
            overlay.remove();
        };
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    }
    
    // 【修复】返回桌面按钮 - 直接跳转到根目录的桌面
    if (backToDesktopBtn) {
        backToDesktopBtn.addEventListener('click', () => {
            window.location.href = '../../index.html';
        });
    }
    
    // 侧拉栏菜单简单提示
    document.querySelectorAll('.menu-item').forEach(menu => {
        menu.addEventListener('click', () => { alert('功能开发中'); closeDrawer(); });
    });
    
    // 初始化
    function init() {
        loadChatsFromLocal();
        renderMessageList();
        renderContactsList();
    }
    window.addEventListener('pageshow', function() {
        AI_CONTACTS = loadContacts();
        renderMessageList();
        renderContactsList();
    });

    init();
</script>

<!-- 删除确认弹窗 -->
<div class="del-modal-overlay" id="delModal">
  <div class="del-modal">
    <div class="icon">⚠️</div>
    <h4 id="delModalTitle">删除角色？</h4>
    <div class="desc" id="delModalDesc">删除后该角色将从联系人列表中完全消失，所有聊天记录、记忆和设置都将被清除，无法找回。</div>
    <div class="btns">
      <button class="cancel" id="delModalCancel">取消</button>
      <button class="confirm-danger" id="delModalConfirm">确定删除</button>
    </div>
  </div>
</div>
</body>
</html>
