<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>聊天外观</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:#f5f7fb;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{background:#fff;border:1px solid #e2e8f0;padding:10px 16px;border-radius:24px;font-size:15px;cursor:pointer;color:#1e293b}
h1{font-size:22px;font-weight:600}
.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.card h3{font-size:16px;margin-bottom:14px;color:#1e293b}
.row{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.row label{font-size:14px;min-width:70px;color:#475569}
.btn-sm{padding:8px 16px;border:none;border-radius:16px;font-size:13px;cursor:pointer;background:#f1f5f9;color:#1e293b}
.btn-sm.active{background:#007aff;color:#fff}
.btn-sm:active{transform:scale(.96)}
input[type="number"]{width:70px;padding:8px;border-radius:12px;border:1px solid #e2e8f0;text-align:center;font-size:14px}
.preview{text-align:center;padding:16px;background:#f8fafc;border-radius:16px;margin-top:12px}
.preview-bubble{padding:10px 16px;border-radius:20px;margin:8px auto;max-width:200px}
.preview-ai{background:#e5e5ea;color:#1c1c1e;text-align:left}
.preview-me{background:#007aff;color:#fff;text-align:right;margin-left:auto}
.bg-preview{width:100%;height:60px;border-radius:12px;margin-top:8px;border:1px solid #e2e8f0}
@keyframes pageIn{from{opacity:0}to{opacity:1}}</style>
</head>
<body style="animation:pageIn .2s ease">
<div class="header"><button class="back-btn" onclick="history.back()">← 返回</button><h1>🎨 聊天外观</h1></div>
<div class="card"><h3>聊天背景</h3>
  <div class="row"><button class="btn-sm" id="bgColorBtn">纯色</button><button class="btn-sm" id="bgGradientBtn">渐变预设</button><button class="btn-sm" id="bgImageBtn">图片URL</button></div>
  <div class="bg-preview" id="bgPreview"></div>
</div>
<div class="card"><h3>气泡主题</h3>
  <div class="row"><button class="btn-sm active" id="bubbleRound">圆润</button><button class="btn-sm" id="bubbleSquare">方角</button></div>
  <div class="preview"><div class="preview-bubble preview-ai">AI: 你好呀~</div><div class="preview-bubble preview-me">我: 下午好！</div></div>
</div>
<div class="card"><h3>字体大小</h3>
  <div class="row"><label>字号</label><input type="number" id="fontSizeInput" value="16" min="12" max="24" step="1"><span style="font-size:13px;color:#94a3b8">12-24</span></div>
</div>
<script>
const p=new URLSearchParams(window.location.search),contactId=p.get('id');
function getKey(){return'appearance_'+contactId}
function load(){try{return JSON.parse(localStorage.getItem(getKey())||'{}')}catch(e){return{}}}
function save(c){localStorage.setItem(getKey(),JSON.stringify(c))}
let cfg=load();if(!cfg.bgType)cfg={bgType:'color',bgValue:'#f8f8fa',bubbleStyle:'round',fontSize:16};
function upd(){
  document.getElementById('bgPreview').style.background=cfg.bgType==='gradient'?cfg.bgValue||'linear-gradient(135deg,#667eea,#764ba2)':cfg.bgValue||'#f8f8fa';
  document.getElementById('bubbleRound').classList.toggle('active',cfg.bubbleStyle==='round');
  document.getElementById('bubbleSquare').classList.toggle('active',cfg.bubbleStyle==='square');
  document.getElementById('fontSizeInput').value=cfg.fontSize;
  document.querySelector('.preview-ai').style.borderRadius=document.querySelector('.preview-me').style.borderRadius=cfg.bubbleStyle==='round'?'20px':'8px';
  document.querySelector('.preview-ai').style.fontSize=document.querySelector('.preview-me').style.fontSize=cfg.fontSize+'px';
}
upd();
document.getElementById('bgColorBtn').onclick=()=>{const c=prompt('背景颜色(#RRGGBB)',cfg.bgValue);if(c){cfg.bgType='color';cfg.bgValue=c;save(cfg);upd()}};
document.getElementById('bgGradientBtn').onclick=()=>{cfg.bgType='gradient';cfg.bgValue='linear-gradient(135deg,#667eea,#764ba2)';save(cfg);upd()};
document.getElementById('bgImageBtn').onclick=()=>{const u=prompt('图片URL');if(u){cfg.bgType='image';cfg.bgValue=u;save(cfg);upd()}};
document.getElementById('bubbleRound').onclick=()=>{cfg.bubbleStyle='round';save(cfg);upd()};
document.getElementById('bubbleSquare').onclick=()=>{cfg.bubbleStyle='square';save(cfg);upd()};
document.getElementById('fontSizeInput').onchange=e=>{const v=parseInt(e.target.value);if(v>=12&&v<=24){cfg.fontSize=v;save(cfg);upd()}};
</script>
</body>
</html>
