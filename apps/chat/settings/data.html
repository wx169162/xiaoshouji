<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数据操作</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:#f5f7fb;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{background:#fff;border:1px solid #e2e8f0;padding:10px 16px;border-radius:24px;font-size:15px;cursor:pointer;color:#1e293b}
h1{font-size:22px;font-weight:600}
.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.card h3{font-size:16px;margin-bottom:16px;color:#1e293b}
.btn{padding:12px 20px;border:none;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;width:100%;text-align:center;display:block}
.btn-secondary{background:#f1f5f9;color:#1e293b;margin-bottom:10px}
.btn-danger{background:#fee2e2;color:#dc2626;margin-bottom:10px}
.btn-delete{background:#dc2626;color:#fff}
.btn:active{transform:scale(.97);opacity:.8}
.danger-zone{margin-top:20px;padding-top:16px;border-top:1px solid #fee2e2}
.danger-zone h4{color:#dc2626;margin-bottom:12px}
@keyframes pageIn{from{opacity:0}to{opacity:1}}</style>
</head>
<body style="animation:pageIn .2s ease">
<div class="header"><button class="back-btn" onclick="history.back()">← 返回</button><h1>⚙️ 数据操作</h1></div>
<div class="card"><h3>📦 聊天记录</h3>
  <button class="btn btn-secondary" id="importBtn">📥 导入聊天记录</button>
  <button class="btn btn-secondary" id="exportBtn">📤 导出聊天记录</button>
  <button class="btn btn-danger" id="clearBtn">🗑️ 清空聊天记录</button>
</div>
<div class="card danger-zone"><h4>💀 危险操作</h4>
  <p style="font-size:13px;color:#64748b;margin-bottom:16px">删除后所有数据将永久丢失</p>
  <button class="btn btn-delete" id="deleteBtn">删除角色及所有数据</button>
</div>
<script>
const p=new URLSearchParams(window.location.search),contactId=p.get('id');
function delRole(id){const s=JSON.parse(localStorage.getItem('contacts_custom_settings')||'{}');delete s[id];localStorage.setItem('contacts_custom_settings',JSON.stringify(s));['chat_history_','memory_','appearance_'].forEach(k=>localStorage.removeItem(k+id));}
document.getElementById('exportBtn').onclick=()=>{const d=localStorage.getItem('chat_history_'+contactId)||'[]',b=new Blob([d],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='chat_'+contactId+'.json';a.click()};
document.getElementById('importBtn').onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(confirm('导入将覆盖当前聊天记录，确定吗？')){localStorage.setItem('chat_history_'+contactId,JSON.stringify(d));alert('已导入')}}catch(e){alert('文件格式错误')}};r.readAsText(f)};i.click()};
document.getElementById('clearBtn').onclick=()=>{if(confirm('清空所有聊天记录？')){localStorage.setItem('chat_history_'+contactId,'[]');alert('已清空')}};
document.getElementById('deleteBtn').onclick=()=>{if(confirm('彻底删除此角色？不可恢复！')){delRole(contactId);alert('已删除');window.location.href='../index.html'}};
</script>
</body>
</html>
