<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数据操作</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,sans-serif;background:#f5f7fb;padding:16px;min-height:100vh}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{background:#fff;border:1px solid #e2e8f0;padding:10px 16px;border-radius:24px;font-size:15px;cursor:pointer;color:#1e293b}
h1{font-size:22px;font-weight:600}
.card{background:#fff;border-radius:20px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04)}
.card h3{font-size:16px;margin-bottom:16px;color:#1e293b}
.btn{padding:12px 20px;border:none;border-radius:24px;font-size:14px;font-weight:500;cursor:pointer;width:100%;text-align:center;display:block}
.btn-secondary{background:#f1f5f9;color:#1e293b;margin-bottom:10px}
.btn-danger{background:#fee2e2;color:#dc2626}
.btn:active{transform:scale(.97);opacity:.8}
.note{font-size:13px;color:#94a3b8;margin-top:10px;padding:10px 14px;background:#f8fafc;border-radius:12px;line-height:1.5}

/* 美化弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);justify-content:center;align-items:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:24px;width:100%;max-width:320px;padding:28px 24px 20px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.15)}
.modal .icon{font-size:40px;margin-bottom:12px}
.modal h4{font-size:17px;color:#1e293b;margin-bottom:8px}
.modal .desc{font-size:14px;color:#64748b;line-height:1.6;margin-bottom:20px}
.modal .btns{display:flex;gap:10px}
.modal .btns button{flex:1;padding:12px;border:none;border-radius:20px;font-size:15px;cursor:pointer;font-weight:500}
.modal .btns .cancel{background:#f1f5f9;color:#64748b}
.modal .btns .confirm-danger{background:#dc2626;color:#fff}
.modal .btns .confirm{background:#007aff;color:#fff}
</style>
</head>
<body>
<div class="header"><button class="back-btn" onclick="history.back()"><i class="fas fa-chevron-left"></i> 返回</button><h1><i class="fas fa-database"></i> 数据操作</h1></div>

<div class="card"><h3><i class="fas fa-comments"></i> 聊天记录</h3>
  <button class="btn btn-secondary" id="importBtn"><i class="fas fa-file-import"></i> 导入聊天记录</button>
  <button class="btn btn-secondary" id="exportBtn"><i class="fas fa-file-export"></i> 导出聊天记录</button>
  <button class="btn btn-danger" id="clearBtn"><i class="fas fa-trash-alt"></i> 清空聊天记录</button>
  <div class="note"><i class="fas fa-info-circle"></i> 清空聊天记录不会影响角色的总结和记忆</div>
</div>

<div class="card"><h3><i class="fas fa-undo-alt"></i> 重置角色</h3>
  <p style="font-size:13px;color:#64748b;margin-bottom:16px">角色会保留在联系人列表中，但所有数据将被清空——回到刚加好友时的状态。</p>
  <button class="btn btn-danger" id="resetBtn"><i class="fas fa-trash-alt"></i> 清空角色数据</button>
  <div class="note"><i class="fas fa-info-circle"></i> 将清除：聊天记录 / 记忆总结 / 外观设置 / 表情包 / 自定义人设</div>
</div>

<!-- 美化弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="icon"><i class="fas fa-trash-alt" style="font-size:40px;color:#dc2626"></i></div>
    <h4 id="modalTitle">清空聊天记录？</h4>
    <div class="desc" id="modalDesc">将清空与当前角色的所有聊天记录，但角色的自动总结和长期记忆会被保留。</div>
    <div class="btns">
      <button class="cancel" id="modalCancel">取消</button>
      <button class="confirm" id="modalConfirm">确定清空</button>
    </div>
  </div>
</div>

<script>
const p=new URLSearchParams(window.location.search),contactId=p.get('id');

// 美化弹窗
function showConfirm(title, desc, confirmText, confirmClass, action) {
  const modal = document.getElementById('modal');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalDesc').textContent = desc;
  const confirmBtn = document.getElementById('modalConfirm');
  confirmBtn.textContent = confirmText;
  confirmBtn.className = confirmClass || 'confirm';
  confirmBtn.onclick = () => { modal.classList.remove('open'); action(); };
  document.getElementById('modalCancel').onclick = () => modal.classList.remove('open');
  modal.classList.add('open');
}

document.getElementById('exportBtn').onclick=()=>{const d=localStorage.getItem('chat_history_'+contactId)||'[]',b=new Blob([d],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='chat_'+contactId+'.json';a.click()};
document.getElementById('importBtn').onclick=()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);showConfirm('导入聊天记录？','导入将覆盖当前所有聊天记录。角色的总结和记忆不受影响。','确定导入','confirm',()=>{localStorage.setItem('chat_history_'+contactId,JSON.stringify(d));alert('已导入')})}catch(e){alert('文件格式错误')}};r.readAsText(f)};i.click()};
document.getElementById('clearBtn').onclick=()=>{showConfirm('清空聊天记录？','将清空与当前角色的所有聊天记录，但角色的自动总结和长期记忆会被保留。','确定清空','confirm-danger',()=>{localStorage.setItem('chat_history_'+contactId,'[]');alert('已清空')})};
document.getElementById('resetBtn').onclick=()=>{showConfirm('清空角色所有数据？','角色「'+contactId+'」不会被删除，但聊天记录、记忆总结、外观设置、表情包、自定义人设等全部数据将被清空，回到刚加好友时的状态。此操作不可恢复。','确定清空','confirm-danger',()=>{['chat_history_','memory_','appearance_','emoji_'].forEach(k=>localStorage.removeItem(k+contactId));const s=JSON.parse(localStorage.getItem('contacts_custom_settings')||'{}');delete s[contactId];localStorage.setItem('contacts_custom_settings',JSON.stringify(s));alert('角色数据已清空')})};
</script>
</body>
</html>
