<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>角色设置 - AI助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f8fa;
        }

        .settings-page {
            min-height: 100vh;
            background: #f8f8fa;
            display: flex;
            flex-direction: column;
        }

        .settings-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border-bottom: 0.5px solid #e9e9ef;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #007aff;
            cursor: pointer;
            border-radius: 8px;
            background: #f2f2f6;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .back-btn:active {
            background: #e5e5ea;
            transform: scale(0.95);
        }

        .settings-header h1 {
            flex: 1;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #1c1c1e;
        }

        .placeholder {
            width: 36px;
            flex-shrink: 0;
        }

        .settings-content {
            flex: 1;
            padding-bottom: 90px;
        }

        .settings-collapse {
            background: white;
            margin-top: 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .settings-collapse summary {
            padding: 18px 20px;
            font-weight: 600;
            font-size: 17px;
            color: #1c1c1e;
            background: white;
            cursor: pointer;
            list-style: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 0.5px solid #e9e9ef;
        }
        .settings-collapse summary::-webkit-details-marker {
            display: none;
        }
        .settings-collapse summary::after {
            content: "▼";
            font-size: 14px;
            color: #8e8e93;
            transition: transform 0.2s;
        }
        .settings-collapse[open] summary::after {
            transform: rotate(180deg);
        }
        .collapse-inner {
            padding: 20px;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #1c1c1e;
            margin: 16px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .section-title:first-of-type {
            margin-top: 0;
        }

        .info-input, .select-field, .text-field, .number-input {
            background: #f2f2f6;
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 15px;
            width: 100%;
            margin-bottom: 12px;
            font-family: inherit;
        }
        .number-input {
            text-align: center;
        }
        .textarea-field {
            background: #f2f2f6;
            border: none;
            border-radius: 16px;
            padding: 12px;
            font-size: 14px;
            width: 100%;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 12px;
        }
        .row-flex {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .row-flex label {
            flex: 1;
        }
        .mini-btn {
            background: #f2f2f6;
            border: none;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
        }
        .mini-btn:active { background: #e5e5ea; }
        .primary-btn {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
            font-weight: 500;
        }
        .danger-btn {
            background: #ff3b30;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 8px 16px;
        }
        .secondary-outline {
            background: transparent;
            border: 0.5px solid #007aff;
            color: #007aff;
            border-radius: 24px;
            padding: 6px 14px;
        }
        .summary-list {
            max-height: 260px;
            overflow-y: auto;
            background: #f9f9fb;
            border-radius: 16px;
            padding: 8px;
            margin-top: 10px;
        }
        .summary-item {
            background: white;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .summary-time {
            font-size: 11px;
            color: #8e8e93;
            margin-bottom: 6px;
        }
        .summary-text {
            font-size: 13px;
            color: #1c1c1e;
            margin-bottom: 8px;
            word-break: break-word;
        }
        .summary-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .emoji-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 12px 0;
        }
        .emoji-card {
            background: #f2f2f6;
            border-radius: 20px;
            padding: 8px 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 20px;
            cursor: pointer;
        }
        .emoji-checkbox {
            margin-right: 4px;
            transform: scale(0.9);
        }
        .preview-bubble {
            background: #e5e5ea;
            padding: 10px 16px;
            border-radius: 20px;
            max-width: 80%;
            margin: 8px 0;
        }
        .preview-mine {
            background: #007aff;
            color: white;
            margin-left: auto;
        }
        .bg-preview {
            height: 60px;
            border-radius: 16px;
            margin-top: 8px;
            background-size: cover;
        }
        .save-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            padding: 12px 20px 24px;
            border-top: 0.5px solid #e9e9ef;
            z-index: 20;
        }
        .save-main-btn {
            background: #007aff;
            color: white;
            border: none;
            border-radius: 32px;
            padding: 14px;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .avatar-dual-row {
            display: flex;
            gap: 20px;
            margin-bottom: 8px;
        }
        .avatar-card {
            flex: 1;
            text-align: center;
            background: #f9f9fb;
            border-radius: 20px;
            padding: 12px 8px;
            cursor: pointer;
        }
        .avatar-circle-lg {
            width: 80px;
            height: 80px;
            background: #e9e9ef;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 10px;
            overflow: hidden;
        }
        .avatar-img { width: 100%; height: 100%; object-fit: cover; }
        .block-status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
        }
        .action-btn {
            background: #e5e5ea;
            border: none;
            border-radius: 32px;
            padding: 8px 16px;
        }
        .hidden-file-input { display: none; }
        .avatar-picker-menu {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            z-index: 1100;
            animation: slideUp 0.2s;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .picker-option { padding: 16px; text-align: center; border-bottom: 0.5px solid #e9e9ef; cursor: pointer; }
        .picker-cancel { color: #ff3b30; border-bottom: none; margin-top: 8px; }
        
        .number-input-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .number-input-group .number-input {
            flex: 1;
            margin-bottom: 0;
        }
    </style>
</head>
<body>
<div class="settings-page">
    <div class="settings-header">
        <div class="back-btn" id="backBtn">←</div>
        <h1>角色设置</h1>
        <div class="placeholder"></div>
    </div>
    <div class="settings-content" id="settingsContent"></div>
    <div class="save-footer">
        <button id="globalSaveBtn" class="save-main-btn">保存所有设置</button>
    </div>
</div>

<script>
    // ---------- AI 角色数据 ----------
    const AI_CONTACTS = [
        { id: 'ai_general', name: '通用助手', avatar: '🤖', desc: '全能AI助手', role: 'general' },
        { id: 'ai_coding', name: '编程助手', avatar: '💻', desc: '专注代码', role: 'coding' },
        { id: 'ai_psychologist', name: '心理顾问', avatar: '🌿', desc: '情绪支持', role: 'psychologist' }
    ];
    let currentContact = null;
    let contactsSettings = {};

    function getContactById(id) { return AI_CONTACTS.find(c => c.id === id); }
    function loadContactsSettings() {
        const saved = localStorage.getItem('contacts_custom_settings');
        if (saved) { try { contactsSettings = JSON.parse(saved); } catch(e) {} }
        if (!contactsSettings) contactsSettings = {};
    }
    function saveContactsSettings() { localStorage.setItem('contacts_custom_settings', JSON.stringify(contactsSettings)); }
    function getContactSettings(contactId) {
        if (!contactsSettings[contactId]) {
            contactsSettings[contactId] = { roleAvatar: '🤖', myAvatar: '😀', realName: '', nickname: '', callPrefer: '', rolePersona: '', userPersona: '', worldBook: 'default', isBlocked: false };
            saveContactsSettings();
        }
        return contactsSettings[contactId];
    }
    function updateContactSettings(contactId, updates) { Object.assign(getContactSettings(contactId), updates); saveContactsSettings(); }

    // 存储 key 封装
    function getMemoryKey(id) { return `memory_${id}`; }
    function getEmojiGlobalKey() { return 'emoji_global'; }
    function getEmojiCustomKey(id) { return `emoji_custom_${id}`; }
    function getAppearanceKey(id) { return `appearance_${id}`; }

    function loadMemoryConfig(contactId) {
        const key = getMemoryKey(contactId);
        const def = { autoSummarize: true, triggerCount: 50, summaryPrompt: "请总结我们对话中的关键信息、重要约定和用户偏好。", summaries: [], contextTokens: 20, replyMin: 1, replyMax: 3, shareWith: null };
        const saved = localStorage.getItem(key);
        return saved ? JSON.parse(saved) : def;
    }
    function saveMemoryConfig(contactId, cfg) { localStorage.setItem(getMemoryKey(contactId), JSON.stringify(cfg)); }

    function loadEmojiGlobal() {
        const def = [{ id: 'g1', name: '😂 笑哭', url: '😂' }, { id: 'g2', name: '❤️ 爱心', url: '❤️' }, { id: 'g3', name: '👍 点赞', url: '👍' }];
        const saved = localStorage.getItem(getEmojiGlobalKey());
        return saved ? JSON.parse(saved) : def;
    }
    function saveEmojiGlobal(emojis) { localStorage.setItem(getEmojiGlobalKey(), JSON.stringify(emojis)); }
    function loadEmojiCustom(contactId) {
        const def = [{ id: `c1_${contactId}`, name: '🤖 专属机器人', url: '🤖' }];
        const saved = localStorage.getItem(getEmojiCustomKey(contactId));
        return saved ? JSON.parse(saved) : def;
    }
    function saveEmojiCustom(contactId, emojis) { localStorage.setItem(getEmojiCustomKey(contactId), JSON.stringify(emojis)); }

    function loadAppearance(contactId) {
        const def = { bgType: 'color', bgValue: '#f8f8fa', bubbleStyle: 'round', fontSize: 16 };
        const saved = localStorage.getItem(getAppearanceKey(contactId));
        return saved ? JSON.parse(saved) : def;
    }
    function saveAppearance(contactId, app) { localStorage.setItem(getAppearanceKey(contactId), JSON.stringify(app)); }

    function getTotalMessages(contactId) {
        const key = `chat_history_${contactId}`;
        const raw = localStorage.getItem(key);
        if (!raw) return 0;
        try {
            const msgs = JSON.parse(raw);
            return Array.isArray(msgs) ? msgs.length : 0;
        } catch(e) { return 0; }
    }

    function getWorldbookList() {
        let wb = [];
        try { const s = localStorage.getItem('worldbooks'); if(s) wb = JSON.parse(s); } catch(e) {}
        if(wb.length===0) wb = [{ id: 'default', name: '默认世界书' }, { id: 'fantasy', name: '奇幻世界' }];
        return wb;
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function showAvatarPicker(currentVal, onSelect) {
        const menu = document.createElement('div'); menu.className = 'avatar-picker-menu';
        menu.innerHTML = `<div class="picker-option" id="pickerCamera">📸 从相册选取</div><div class="picker-option" id="pickerUrl">🔗 输入图片URL</div><div class="picker-option picker-cancel" id="pickerCancel">取消</div><input type="file" id="hiddenFileInput" accept="image/*" style="display:none">`;
        document.body.appendChild(menu);
        const fileInput = document.getElementById('hiddenFileInput');
        const handle = (val) => { menu.remove(); if(val) onSelect(val); };
        document.getElementById('pickerCamera').onclick = () => { fileInput.click(); fileInput.onchange = (e) => { const f = e.target.files[0]; if(f && f.type.startsWith('image/')){ const rd = new FileReader(); rd.onload = ev => handle(ev.target.result); rd.readAsDataURL(f); } else alert('请选择图片'); }; };
        document.getElementById('pickerUrl').onclick = () => { const url = prompt('图片URL:'); if(url && url.trim()) handle(url.trim()); };
        document.getElementById('pickerCancel').onclick = () => menu.remove();
    }
    function renderAvatar(val, container) {
        container.innerHTML = '';
        if(!val) { container.innerText = '🤖'; return; }
        if(val.startsWith('data:image') || val.startsWith('http')){ const img = document.createElement('img'); img.className='avatar-img'; img.src=val; img.onerror=()=>{container.innerText='🖼️';}; container.appendChild(img);}
        else container.innerText = val;
    }

    function clearChatHistory(contactId) { localStorage.removeItem(`chat_history_${contactId}`); }
    function deleteRole(contactId) {
        localStorage.removeItem(`chat_history_${contactId}`);
        delete contactsSettings[contactId];
        saveContactsSettings();
        localStorage.removeItem(getMemoryKey(contactId));
        localStorage.removeItem(getEmojiCustomKey(contactId));
        localStorage.removeItem(getAppearanceKey(contactId));
    }

    // 存储页面临时变量
    let tempMemory, tempGlobalEmojis, tempCustomEmojis, tempAppearance;
    let newRoleAvatar, newMyAvatar;

    // 更新外观预览（不重新渲染整个页面）
    function updateAppearancePreview() {
        if (!tempAppearance) return;
        const bgPreview = document.getElementById('bgPreview');
        if (bgPreview) {
            let bgCss = '';
            if (tempAppearance.bgType === 'color') bgCss = tempAppearance.bgValue;
            else if (tempAppearance.bgType === 'gradient') bgCss = tempAppearance.bgValue;
            else if (tempAppearance.bgType === 'image') bgCss = `url(${tempAppearance.bgValue}) center/cover`;
            bgPreview.style.background = bgCss;
        }
        
        const bubbleRound = document.getElementById('bubbleRound');
        const bubbleSquare = document.getElementById('bubbleSquare');
        if (bubbleRound && bubbleSquare) {
            if (tempAppearance.bubbleStyle === 'round') {
                bubbleRound.classList.add('primary-btn');
                bubbleSquare.classList.remove('primary-btn');
            } else {
                bubbleSquare.classList.add('primary-btn');
                bubbleRound.classList.remove('primary-btn');
            }
        }
        
        const fontSizeVal = document.getElementById('fontSizeVal');
        if (fontSizeVal) fontSizeVal.innerText = `${tempAppearance.fontSize}px`;
        
        const previewAi = document.querySelector('.preview-bubble:first-of-type');
        const previewMine = document.querySelector('.preview-bubble.preview-mine');
        if (previewAi) {
            const borderRadius = tempAppearance.bubbleStyle === 'round' ? '20px' : '8px';
            previewAi.style.borderRadius = borderRadius;
            previewAi.style.fontSize = `${tempAppearance.fontSize}px`;
            if (previewMine) {
                previewMine.style.borderRadius = borderRadius;
                previewMine.style.fontSize = `${tempAppearance.fontSize}px`;
            }
        }
    }

    // 渲染主页面
    function renderFullPage() {
        if(!currentContact) { document.getElementById('settingsContent').innerHTML = '<div style="padding:40px">角色不存在</div>'; return; }
        const settings = getContactSettings(currentContact.id);
        const worldbooks = getWorldbookList();
        const memory = loadMemoryConfig(currentContact.id);
        const globalEmojis = loadEmojiGlobal();
        const customEmojis = loadEmojiCustom(currentContact.id);
        const appearance = loadAppearance(currentContact.id);
        const totalMsgs = getTotalMessages(currentContact.id);
        
        newRoleAvatar = settings.roleAvatar || '🤖';
        newMyAvatar = settings.myAvatar || '😀';
        tempMemory = JSON.parse(JSON.stringify(memory));
        tempGlobalEmojis = JSON.parse(JSON.stringify(globalEmojis));
        tempCustomEmojis = JSON.parse(JSON.stringify(customEmojis));
        tempAppearance = JSON.parse(JSON.stringify(appearance));
        
        let otherContacts = AI_CONTACTS.filter(c => c.id !== currentContact.id).map(c => ({ id: c.id, name: c.name }));

        const html = `
            <div style="background:white; margin-top:0; padding:0 0 8px 0;">
                <div class="collapse-inner" style="padding:16px">
                    <div class="avatar-dual-row">
                        <div class="avatar-card" id="roleAvatarCard"><div class="avatar-circle-lg" id="roleAvatarPreview"></div><div class="avatar-label">角色头像</div><div class="avatar-change-hint">点击更换</div></div>
                        <div class="avatar-card" id="myAvatarCard"><div class="avatar-circle-lg" id="myAvatarPreview"></div><div class="avatar-label">我的头像</div><div class="avatar-change-hint">点击更换</div></div>
                    </div>
                    <input type="text" id="realName" class="info-input" placeholder="角色真名" value="${escapeHtml(settings.realName || '')}">
                    <input type="text" id="nickname" class="info-input" placeholder="备注名" value="${escapeHtml(settings.nickname || '')}">
                    <input type="text" id="callPrefer" class="info-input" placeholder="称呼偏好" value="${escapeHtml(settings.callPrefer || '')}">
                    <textarea id="rolePersona" class="textarea-field" rows="2" placeholder="角色人设">${escapeHtml(settings.rolePersona || '')}</textarea>
                    <textarea id="userPersona" class="textarea-field" rows="2" placeholder="我的人设">${escapeHtml(settings.userPersona || '')}</textarea>
                    <select id="worldBook" class="select-field">${worldbooks.map(w => `<option value="${w.id}" ${settings.worldBook===w.id?'selected':''}>${escapeHtml(w.name)}</option>`).join('')}</select>
                    <div class="block-status-row"><span>🚫 拉黑角色</span><button id="blockToggleBtn" class="action-btn" style="background:${settings.isBlocked?'#ff3b30':'#e5e5ea'};color:${settings.isBlocked?'white':'#1c1c1e'}">${settings.isBlocked?'已拉黑，点击解除':'拉黑该角色'}</button></div>
                </div>
            </div>

            <details class="settings-collapse" open>
                <summary>🧠 记忆与上下文</summary>
                <div class="collapse-inner">
                    <div class="section-title">📌 长期记忆总结</div>
                    <div class="row-flex"><label>总结模式</label><select id="summarizeMode" class="select-field" style="width:auto; flex:1"><option value="auto" ${tempMemory.autoSummarize?'selected':''}>自动总结</option><option value="manual" ${!tempMemory.autoSummarize?'selected':''}>手动</option></select></div>
                    <div class="row-flex"><label>触发条数</label><input type="number" id="triggerCountInput" class="number-input" value="${tempMemory.triggerCount}" step="1" style="flex:1"></div>
                    <div class="section-title">总结提示词</div>
                    <textarea id="summaryPrompt" class="textarea-field" rows="2">${escapeHtml(tempMemory.summaryPrompt)}</textarea>
                    <button id="forceSummarizeBtn" class="mini-btn primary-btn" style="margin-bottom:16px">✨ 立即总结 (占位)</button>
                    <div class="section-title">已有总结列表</div>
                    <div id="summaryListContainer" class="summary-list"></div>
                    <div class="row-flex" style="margin-top:8px"><button id="aiSimplifySelected" class="mini-btn">✨ AI精简选中</button><button id="batchDeleteSummaries" class="mini-btn danger-btn" style="background:#ff3b30;color:white">🗑️ 批量删除</button></div>
                    <div class="section-title">🔗 记忆互通</div>
                    <div class="row-flex"><span>允许与</span><select id="shareWithSelect"><option value="">无</option>${otherContacts.map(c=>`<option value="${c.id}" ${tempMemory.shareWith===c.id?'selected':''}>${escapeHtml(c.name)}</option>`).join('')}</select><span>共享记忆</span></div>
                    <div class="row-flex"><label>上下文记忆条数</label><input type="number" id="contextTokensInput" class="number-input" value="${tempMemory.contextTokens}" step="1" style="flex:1"></div>
                    <div class="row-flex"><span>回复条数区间</span><input type="number" id="replyMin" value="${tempMemory.replyMin}" style="width:80px; background:#f2f2f6; border:none; border-radius:12px; padding:6px; text-align:center"> ~ <input type="number" id="replyMax" value="${tempMemory.replyMax}" style="width:80px; background:#f2f2f6; border:none; border-radius:12px; padding:6px; text-align:center"></div>
                    <div class="row-flex"><span>💬 总消息数: ${totalMsgs}</span><span>📊 Token估算: ~${totalMsgs * 85} tokens (示例)</span></div>
                </div>
            </details>

            <details class="settings-collapse">
                <summary>😜 表情包库</summary>
                <div class="collapse-inner">
                    <div style="display:flex; gap:10px; border-bottom:0.5px solid #e9e9ef; margin-bottom:16px"><button id="tabGlobalEmoji" class="mini-btn" style="background:#007aff; color:white">🌍 全局表情包</button><button id="tabCustomEmoji" class="mini-btn">🎭 角色专属</button></div>
                    <div id="emojiTabContent"></div>
                    <div class="row-flex" style="margin-top:12px"><button id="uploadLocalEmoji" class="mini-btn">📁 本地上传</button><button id="uploadUrlEmoji" class="mini-btn">🔗 单URL导入</button></div>
                </div>
            </details>

            <details class="settings-collapse">
                <summary>🎨 聊天外观</summary>
                <div class="collapse-inner">
                    <div class="section-title">聊天背景</div>
                    <div class="row-flex"><button id="bgColorBtn" class="mini-btn">纯色</button><button id="bgGradientBtn" class="mini-btn">渐变预设</button><button id="bgImageBtn" class="mini-btn">图片URL</button></div>
                    <div id="bgPreview" class="bg-preview" style="background:${tempAppearance.bgType==='color'?tempAppearance.bgValue:(tempAppearance.bgType==='gradient'?'linear-gradient(135deg, #667eea 0%, #764ba2 100%)':'#cccccc')}"></div>
                    <div class="section-title">气泡主题</div>
                    <div class="row-flex"><button id="bubbleRound" class="mini-btn ${tempAppearance.bubbleStyle==='round'?'primary-btn':''}">圆润</button><button id="bubbleSquare" class="mini-btn ${tempAppearance.bubbleStyle==='square'?'primary-btn':''}">方角</button></div>
                    <div class="row-flex"><label>字体大小</label><input type="number" id="fontSizeInput" class="number-input" value="${tempAppearance.fontSize}" min="12" max="24" step="1" style="width:80px"></div>
                    <div class="section-title">预览</div>
                    <div class="preview-bubble" style="border-radius:${tempAppearance.bubbleStyle==='round'?'20px':'8px'}; font-size:${tempAppearance.fontSize}px">AI: 你好呀~</div>
                    <div class="preview-bubble preview-mine" style="border-radius:${tempAppearance.bubbleStyle==='round'?'20px':'8px'}; font-size:${tempAppearance.fontSize}px">我: 下午好！</div>
                </div>
            </details>

            <details class="settings-collapse">
                <summary>⚙️ 数据操作</summary>
                <div class="collapse-inner">
                    <div class="action-row" style="display:flex; gap:10px; flex-wrap:wrap"><button id="importChatBtn" class="secondary-outline">📥 导入聊天记录</button><button id="exportChatBtn" class="secondary-outline">📤 导出聊天记录</button><button id="clearChatDataBtn" class="danger-btn" style="background:#ff3b30">🗑️ 清空聊天记录</button><button id="deleteRoleFinalBtn" class="danger-btn" style="background:#ff3b30">💀 删除角色</button></div>
                </div>
            </details>
        `;
        
        const container = document.getElementById('settingsContent');
        container.innerHTML = html;
        
        // 头像预览
        const rolePrev = document.getElementById('roleAvatarPreview'), myPrev = document.getElementById('myAvatarPreview');
        const updateAvatars = () => { renderAvatar(newRoleAvatar, rolePrev); renderAvatar(newMyAvatar, myPrev); };
        updateAvatars();
        document.getElementById('roleAvatarCard').onclick = () => showAvatarPicker(newRoleAvatar, v => { if(v) { newRoleAvatar=v; updateAvatars(); } });
        document.getElementById('myAvatarCard').onclick = () => showAvatarPicker(newMyAvatar, v => { if(v) { newMyAvatar=v; updateAvatars(); } });
        document.getElementById('blockToggleBtn').onclick = () => { const nb = !settings.isBlocked; updateContactSettings(currentContact.id, { isBlocked: nb }); renderFullPage(); };

        // 总结列表渲染
        function renderSummaryList() { 
            const containerEl = document.getElementById('summaryListContainer'); 
            if(!containerEl) return; 
            if(!tempMemory.summaries) tempMemory.summaries = []; 
            containerEl.innerHTML = tempMemory.summaries.map((s, idx) => `<div class="summary-item" data-idx="${idx}"><div class="summary-time">${s.time || '刚刚'}</div><div class="summary-text">${escapeHtml(s.content)}</div><div class="summary-actions"><button class="mini-btn editSummaryBtn" data-idx="${idx}">编辑</button><button class="mini-btn deleteSummaryBtn" data-idx="${idx}">删除</button><button class="mini-btn simplifySummaryBtn" data-idx="${idx}">精简</button></div></div>`).join('') || '<div style="text-align:center;padding:20px">暂无总结</div>';
            document.querySelectorAll('.editSummaryBtn').forEach(btn => { btn.onclick = () => { const idx = btn.dataset.idx; const newText = prompt('编辑总结内容', tempMemory.summaries[idx].content); if(newText) { tempMemory.summaries[idx].content = newText; renderSummaryList(); } }; });
            document.querySelectorAll('.deleteSummaryBtn').forEach(btn => { btn.onclick = () => { const idx = btn.dataset.idx; tempMemory.summaries.splice(idx,1); renderSummaryList(); }; });
            document.querySelectorAll('.simplifySummaryBtn').forEach(btn => { btn.onclick = () => alert('精简功能占位'); });
        }
        
        // 记忆控件绑定
        document.getElementById('triggerCountInput').addEventListener('change', (e) => { let val = parseInt(e.target.value); if (isNaN(val)) val = 50; tempMemory.triggerCount = val; });
        document.getElementById('contextTokensInput').addEventListener('change', (e) => { let val = parseInt(e.target.value); if (isNaN(val)) val = 20; tempMemory.contextTokens = val; });
        document.getElementById('forceSummarizeBtn').onclick = () => { alert('立即总结占位'); const demo = { time: new Date().toLocaleString(), content: '这是占位总结内容。' }; if(!tempMemory.summaries) tempMemory.summaries=[]; tempMemory.summaries.unshift(demo); renderSummaryList(); };
        document.getElementById('aiSimplifySelected').onclick = () => alert('AI精简选中占位');
        document.getElementById('batchDeleteSummaries').onclick = () => { tempMemory.summaries = []; renderSummaryList(); };
        document.getElementById('summarizeMode').onchange = (e) => { tempMemory.autoSummarize = e.target.value === 'auto'; };
        document.getElementById('summaryPrompt').oninput = (e) => { tempMemory.summaryPrompt = e.target.value; };
        document.getElementById('shareWithSelect').onchange = (e) => { tempMemory.shareWith = e.target.value || null; };
        document.getElementById('replyMin').onchange = (e) => { let v = parseInt(e.target.value); if(isNaN(v)) v=1; tempMemory.replyMin = Math.min(v, tempMemory.replyMax); };
        document.getElementById('replyMax').onchange = (e) => { let v = parseInt(e.target.value); if(isNaN(v)) v=3; tempMemory.replyMax = Math.max(v, tempMemory.replyMin); };
        renderSummaryList();

        // 表情包标签页
        let currentTab = 'global';
        function renderEmojiTab(type) {
            const emojiContainer = document.getElementById('emojiTabContent'); if(!emojiContainer) return;
            const list = type === 'global' ? tempGlobalEmojis : tempCustomEmojis;
            emojiContainer.innerHTML = `<div class="emoji-grid" id="emojiGrid">${list.map((e,i)=>`<label class="emoji-card"><input type="checkbox" class="emoji-checkbox" data-emoji-idx="${i}" data-type="${type}"> <span>${e.url || '😊'} ${escapeHtml(e.name)}</span></label>`).join('')}</div><div class="row-flex"><button id="moveEmojiBtn" class="mini-btn">➡️ 移动到</button><button id="copyEmojiBtn" class="mini-btn">📋 复制到</button><button id="deleteEmojiBtn" class="mini-btn danger-btn">删除选中</button><button id="selectAllEmoji" class="mini-btn">全选</button></div>`;
            document.getElementById('moveEmojiBtn').onclick = () => alert('移动到其他角色占位');
            document.getElementById('copyEmojiBtn').onclick = () => alert('复制到其他角色占位');
            document.getElementById('deleteEmojiBtn').onclick = () => { const checks = document.querySelectorAll('.emoji-checkbox:checked'); checks.forEach(c => { const idx = c.dataset.emojiIdx; const typ = c.dataset.type; if(typ==='global') tempGlobalEmojis.splice(idx,1); else tempCustomEmojis.splice(idx,1); }); renderEmojiTab(type); };
            document.getElementById('selectAllEmoji').onclick = () => { document.querySelectorAll('.emoji-checkbox').forEach(c => c.checked=true); };
        }
        document.getElementById('tabGlobalEmoji').onclick = () => { currentTab='global'; renderEmojiTab('global'); document.getElementById('tabGlobalEmoji').style.background='#007aff'; document.getElementById('tabCustomEmoji').style.background='#f2f2f6'; };
        document.getElementById('tabCustomEmoji').onclick = () => { currentTab='custom'; renderEmojiTab('custom'); document.getElementById('tabCustomEmoji').style.background='#007aff'; document.getElementById('tabGlobalEmoji').style.background='#f2f2f6'; };
        renderEmojiTab('global');
        document.getElementById('uploadLocalEmoji').onclick = () => { const name = prompt('表情名称'); if(name) { const url = prompt('表情符号或图片URL'); if(url) { const newEmoji = { id: Date.now().toString(), name, url }; if(currentTab==='global') tempGlobalEmojis.push(newEmoji); else tempCustomEmojis.push(newEmoji); renderEmojiTab(currentTab); } } };
        document.getElementById('uploadUrlEmoji').onclick = () => { const name = prompt('表情名称'); const url = prompt('图片URL'); if(name && url) { const newEmoji = { id: Date.now().toString(), name, url }; if(currentTab==='global') tempGlobalEmojis.push(newEmoji); else tempCustomEmojis.push(newEmoji); renderEmojiTab(currentTab); } };

        // 外观绑定（不重新渲染页面，只更新预览）
        document.getElementById('bgColorBtn').onclick = () => { const c = prompt('背景颜色(#RRGGBB)', '#f0f0f0'); if(c){ tempAppearance.bgType='color'; tempAppearance.bgValue=c; updateAppearancePreview(); } };
        document.getElementById('bgGradientBtn').onclick = () => { tempAppearance.bgType='gradient'; tempAppearance.bgValue='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'; updateAppearancePreview(); };
        document.getElementById('bgImageBtn').onclick = () => { const url = prompt('图片URL'); if(url){ tempAppearance.bgType='image'; tempAppearance.bgValue=url; updateAppearancePreview(); } };
        document.getElementById('bubbleRound').onclick = () => { tempAppearance.bubbleStyle='round'; updateAppearancePreview(); };
        document.getElementById('bubbleSquare').onclick = () => { tempAppearance.bubbleStyle='square'; updateAppearancePreview(); };
        document.getElementById('fontSizeInput').addEventListener('change', (e) => { let val = parseInt(e.target.value); if(isNaN(val)) val=16; if(val<12) val=12; if(val>24) val=24; tempAppearance.fontSize = val; updateAppearancePreview(); });
        
        // 数据操作按钮
        document.getElementById('importChatBtn').onclick = () => alert('导入聊天记录占位');
        document.getElementById('exportChatBtn').onclick = () => { const key=`chat_history_${currentContact.id}`; const data=localStorage.getItem(key); const blob=new Blob([data||'[]'],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`chat_${currentContact.id}.json`; a.click(); };
        document.getElementById('clearChatDataBtn').onclick = () => { if(confirm('清空所有聊天记录?')) clearChatHistory(currentContact.id); alert('已清空'); renderFullPage(); };
        document.getElementById('deleteRoleFinalBtn').onclick = () => { if(confirm('彻底删除角色所有数据？')){ deleteRole(currentContact.id); window.location.href='../index.html'; } };
    }

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const cid = urlParams.get('id');
        if(cid) currentContact = getContactById(cid);
        if(!currentContact) { document.getElementById('settingsContent').innerHTML = '<div style="padding:40px">角色不存在</div>'; return; }
        loadContactsSettings();
        renderFullPage();
        
        // 全局保存
        document.getElementById('globalSaveBtn').onclick = () => {
            updateContactSettings(currentContact.id, { 
                roleAvatar: newRoleAvatar, 
                myAvatar: newMyAvatar, 
                realName: document.getElementById('realName').value, 
                nickname: document.getElementById('nickname').value, 
                callPrefer: document.getElementById('callPrefer').value, 
                rolePersona: document.getElementById('rolePersona').value, 
                userPersona: document.getElementById('userPersona').value, 
                worldBook: document.getElementById('worldBook').value 
            });
            saveMemoryConfig(currentContact.id, tempMemory);
            saveEmojiGlobal(tempGlobalEmojis);
            saveEmojiCustom(currentContact.id, tempCustomEmojis);
            saveAppearance(currentContact.id, tempAppearance);
            alert('所有设置已保存');
        };
        
        document.getElementById('backBtn').addEventListener('click', () => { window.location.href = `../room.html?id=${currentContact.id}`; });
    }
    init();
</script>
</body>
</html>
